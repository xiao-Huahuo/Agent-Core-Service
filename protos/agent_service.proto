syntax = "proto3";

package agent_service;

// ---------------------------------------------------------------------------
// AgentService — Agent 微服务 gRPC 接口定义
//
// 覆盖能力:
//   - AgentCore 的 4 个方法（流式 / 非流式 × 有状态 / 无状态）
//   - SessionService 的 5 个 CRUD 方法
// ---------------------------------------------------------------------------

service AgentService {
  // ---- Agent 调用 ----

  // 无状态流式运行（无长期记忆 / 知识库召回）。
  rpc StreamRun(RunRequest) returns (stream ChunkMessage);

  // 无状态单次运行，返回结构化结果。
  rpc RunOnce(RunRequest) returns (RunResult);

  // 带 session 上下文的流式运行（长期记忆召回 + 消息持久化 + 逐节点推送）。
  rpc StreamSessionPrompt(RunRequest) returns (stream ChunkMessage);

  // 带 session 上下文的单次运行，缓冲全部节点后返回结构化结果。
  rpc RunSessionPrompt(RunRequest) returns (RunResult);

  // ---- Session 管理 ----

  rpc CreateSession(SessionCreateRequest) returns (SessionResponse);

  rpc GetSession(SessionIdRequest) returns (SessionResponse);

  rpc ListUserSessions(ListSessionsRequest) returns (ListSessionsResponse);

  rpc UpdateSessionName(SessionUpdateRequest) returns (SessionResponse);

  rpc DeleteSession(SessionIdRequest) returns (DeleteResponse);

  rpc DeleteAllSessions(DeleteAllSessionsRequest) returns (DeleteResponse);

  // ---- 消息历史 ----

  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);

  // ---- 取消执行 ----

  // 取消指定 session 正在执行的图,中断后部分输出自动保存。
  rpc CancelSession(CancelRequest) returns (CancelResponse);

  // ---- 观测 / trace 事件 ----

  rpc GetEvents(EventsRequest) returns (EventsResponse);
}

// ---------------------------------------------------------------------------
// 通用请求 / 响应
// ---------------------------------------------------------------------------

message RunRequest {
  string prompt = 1;
  string user_id = 2;
  string session_id = 3;
}

message RunResult {
  string graph_diagram = 1;
  string final_output = 2;
  // JSON 序列化的 list[dict],内部结构由 AgentCore 定义。
  string events_json = 3;
  string chunks_json = 4;
}

// ---------------------------------------------------------------------------
// 流式推送块
// ---------------------------------------------------------------------------

message ToolCall {
  string name = 1;
  // JSON 序列化的工具参数 dict。
  string args_json = 2;
  string id = 3;
}

message TraceEntry {
  string node = 1;
  string event = 2;
  string error_type = 3;
  string message = 4;
}

message ChunkMessage {
  string node = 1;
  string content = 2;
  repeated ToolCall tool_calls = 3;
  repeated TraceEntry trace = 4;
  // 当 done == true 时表示流结束，其余字段可忽略。
  bool done = 5;
}

// ---------------------------------------------------------------------------
// Session 管理消息
// ---------------------------------------------------------------------------

message SessionCreateRequest {
  string user_id = 1;
  string session_name = 2;
}

message SessionIdRequest {
  string session_id = 1;
}

message ListSessionsRequest {
  string user_id = 1;
}

message SessionUpdateRequest {
  string session_id = 1;
  string session_name = 2;
}

message SessionResponse {
  string session_id = 1;
  string user_id = 2;
  string session_name = 3;
  // ISO 8601 格式 UTC 时间字符串。
  string created_at = 4;
  string updated_at = 5;
}

message ListSessionsResponse {
  repeated SessionResponse sessions = 1;
}

message DeleteResponse {
  bool success = 1;
  // deleted_count 仅在 DeleteAllSessions 时有意义。
  int32 deleted_count = 2;
}

message DeleteAllSessionsRequest {
  string user_id = 1;
}

// ---------------------------------------------------------------------------
// 消息历史
// ---------------------------------------------------------------------------

message ListMessagesRequest {
  string user_id = 1;
  string session_id = 2;
  int32 limit = 3;
}

message MessageEntry {
  string message_id = 1;
  string session_id = 2;
  string user_id = 3;
  string role = 4;
  string content = 5;
  // JSON 序列化的 tool_calls 列表。
  string tool_calls_json = 6;
  // JSON 序列化的 metadata dict。
  string metadata_json = 7;
  // ISO 8601 格式 UTC 时间字符串。
  string created_at = 8;
}

message ListMessagesResponse {
  repeated MessageEntry messages = 1;
}

// ---------------------------------------------------------------------------
// 观测 / trace 事件
// ---------------------------------------------------------------------------

message EventsRequest {
  string user_id = 1;
  string session_id = 2;
}

message EventEntry {
  string message_id = 1;
  string role = 2;
  string node = 3;
  string content = 4;
  // JSON 序列化的 tool_calls 列表。
  string tool_calls_json = 5;
  // ISO 8601 格式 UTC 时间字符串。
  string created_at = 6;
  // JSON 序列化的 metadata dict。
  string metadata_json = 7;
}

message EventsResponse {
  string session_id = 1;
  string user_id = 2;
  int32 event_count = 3;
  repeated EventEntry events = 4;
}

// ---------------------------------------------------------------------------
// 取消执行
// ---------------------------------------------------------------------------

message CancelRequest {
  string session_id = 1;
}

message CancelResponse {
  bool ok = 1;
}
